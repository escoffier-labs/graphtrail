[package]
name = "graphtrail"
version = "0.1.0"
edition = "2024"
description = "Local code graph sidecar for semantic search, agent context, and Brigade receipts."
license = "MIT"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
regex = "1.11"
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
walkdir = "2.5"
