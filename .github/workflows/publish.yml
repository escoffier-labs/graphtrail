name: Publish crate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to package and publish, for example v0.3.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish exact tag
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release automation
        uses: actions/checkout@v4
        with:
          path: release-automation
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          path: release-source
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release identity
        env:
          TAG: ${{ inputs.tag }}
        run: bash release-automation/scripts/release-preflight.sh "$TAG" release-source
      - name: Validate package
        run: cargo package --locked --manifest-path release-source/Cargo.toml
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish package
        run: cargo publish --locked --manifest-path release-source/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Verify exact registry version
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          bash release-automation/scripts/verify-crates-version.sh graphtrail "${TAG#v}"
