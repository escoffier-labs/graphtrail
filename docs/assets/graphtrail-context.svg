<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="workflow-title workflow-desc">
  <title id="workflow-title">Index once, then ask the graph</title>
  <desc id="workflow-desc">Tree-sitter extracts structure into one local SQLite file for CLI and MCP queries.</desc>
